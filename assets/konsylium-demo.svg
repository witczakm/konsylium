<svg xmlns="http://www.w3.org/2000/svg" width="840" height="470" viewBox="0 0 840 470" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <rect x="0" y="0" width="840" height="470" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="0" y="0" width="840" height="34" rx="10" fill="#161b22"/>
  <rect x="0" y="22" width="840" height="12" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>
  <text x="420" y="21" fill="#8b949e" font-size="12.5" text-anchor="middle">konsylium — Mode A (advisory)</text>

  <text font-size="13.5" xml:space="preserve">
    <tspan x="22" y="62" fill="#7ee787">$</tspan><tspan fill="#c9d1d9"> claude -p </tspan><tspan fill="#a5d6ff">"/konsylium store bidder PII in the same table as scoring?"</tspan>

    <tspan x="22" y="96" fill="#8b949e">konsylium · the Marshal assembled a panel for THIS question:</tspan>
    <tspan x="40" y="120" fill="#d2a8ff">⬡ Architect</tspan><tspan x="200" y="120" fill="#d2a8ff">⬡ Data-integrity</tspan><tspan x="420" y="120" fill="#d2a8ff">⬡ Privacy</tspan>
    <tspan x="40" y="142" fill="#d2a8ff">⬡ Compliance</tspan><tspan x="200" y="142" fill="#d2a8ff">⬡ Pragmatist</tspan><tspan x="420" y="142" fill="#f0883e">⬡ Skeptic (adversary)</tspan>

    <tspan x="22" y="180" fill="#58a6ff" font-size="14">VERDICT</tspan>

    <tspan x="22" y="208" fill="#7ee787">▸ Recommendation</tspan>
    <tspan x="44" y="230" fill="#c9d1d9">Separate tables + an </tspan><tspan fill="#ffffff">immutable snapshot</tspan><tspan fill="#c9d1d9"> of identity at scoring</tspan>
    <tspan x="44" y="250" fill="#c9d1d9">time — a plain foreign key is </tspan><tspan fill="#ffffff">not enough</tspan><tspan fill="#c9d1d9">.</tspan>

    <tspan x="22" y="284" fill="#f0883e">▸ Where they disagreed (dissent)</tspan>
    <tspan x="44" y="306" fill="#c9d1d9">Pragmatist: a single-table MVP is fine for the trivial case.</tspan>
    <tspan x="44" y="326" fill="#c9d1d9">Skeptic: an "FK-only" split is false auditability.</tspan>

    <tspan x="22" y="360" fill="#8b949e">▸ What we don't know</tspan>
    <tspan x="44" y="382" fill="#8b949e">Are the contacts natural persons? (changes the privacy regime)</tspan>

    <tspan x="22" y="418" fill="#6e7681">— a divergence pre-check, not a gate. a human decides. —</tspan>
    <tspan x="22" y="446" fill="#7ee787">$</tspan><tspan fill="#c9d1d9"> ▏</tspan>
  </text>
</svg>
